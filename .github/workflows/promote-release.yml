name: Promote Release (Public Mirror)

# ============================================================================
# Plugin Configuration
# ============================================================================
env:
  PLUGIN_NAME: "Questionable"
  PRIVATE_REPO: "WigglyMuffin/Ambivalence"
  PRIVATE_PAT_NAME: "PLUGIN_PAT"

# Triggered by Ambivalence via repository_dispatch after promoting a testing release
on:
  repository_dispatch:
    types: [promote-release]

permissions:
  contents: write

jobs:
  # ================================================================
  # Promote: flip prerelease flag on a mirrored release
  # ================================================================
  promote:
    if: github.event.action == 'promote-release'
    runs-on: ubuntu-latest
    steps:
      - name: Promote pre-release to full release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          TAG="v${VERSION}"

          echo "Promoting ${TAG} from pre-release to stable..."

          # Get the release by tag
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.id' 2>/dev/null)
          if [ -z "$RELEASE_ID" ]; then
            echo "Error: Release ${TAG} not found"
            exit 1
          fi

          # Determine if this version should be marked as Latest
          # Use the private repo as source of truth instead of local semver comparison
          MAKE_LATEST="true"
          PRIVATE_TOKEN="${{ secrets[env.PRIVATE_PAT_NAME] }}"
          if [ -n "$PRIVATE_TOKEN" ]; then
            PRIVATE_LATEST=$(curl -s -H "Authorization: token $PRIVATE_TOKEN" \
              "https://api.github.com/repos/${{ env.PRIVATE_REPO }}/releases/latest" | jq -r '.tag_name // ""')
            if [ -n "$PRIVATE_LATEST" ] && [ "$TAG" != "$PRIVATE_LATEST" ]; then
              MAKE_LATEST="false"
              echo "Version $TAG is not the latest on private repo ($PRIVATE_LATEST), will not mark as latest"
            fi
          else
            echo "No private repo PAT available, defaulting to make_latest=true"
          fi

          # Flip the prerelease flag and update title/notes
          gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            --method PATCH \
            -f name="${{ env.PLUGIN_NAME }} v${VERSION}" \
            -f body="## ${{ env.PLUGIN_NAME }} v${VERSION}

          Promoted from testing release.

          ### Installation Files
          - \`latest.zip\` - **Plugin archive for installation**
          - \`${{ env.PLUGIN_NAME }}.json\` - Plugin manifest" \
            -F prerelease=false \
            -f make_latest="$MAKE_LATEST"

          echo "Successfully promoted ${TAG} to stable (download counts preserved, make_latest=$MAKE_LATEST)"
